<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Germango Pro 7.1 - Fixed Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary-green: #58CC02;
            --primary-green-dark: #46A302;
            --secondary-blue: #1CB0F6;
            --error-red: #FF4B4B;
            --bg-dark: #131F24;
            --card-dark: #1A2C32;
            --border-color: #37464F;
            --text-main: #FFFFFF;
            --text-dim: #AFAFAF;
            --bonus-gold: #FFC800;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 2px solid var(--border-color); background: var(--bg-dark); z-index: 100; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--primary-green); cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .stats { display: flex; gap: 10px; }
        .stat-box { display: flex; align-items: center; gap: 4px; font-weight: 700; background: var(--card-dark); padding: 4px 10px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .stat-box.buyable { border: 1px solid var(--bonus-gold); }

        /* Main Layout */
        main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 700px; margin: 0 auto; padding: 20px; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; animation: fadeIn 0.3s; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Map Screen */
        .map-wrapper { position: relative; width: 100%; padding: 20px 0 50px; display: flex; flex-direction: column; align-items: center; }
        
        .unit-container { display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 30px; }
        .unit-header { width: 100%; padding: 12px; margin-bottom: 15px; background: linear-gradient(90deg, rgba(88,204,2,0.1) 0%, transparent 100%); border-left: 5px solid var(--primary-green); border-radius: 0 10px 10px 0; }
        .unit-title { font-weight: 800; font-size: 1rem; color: var(--primary-green); }
        .unit-sub { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }
        
        .lessons-row { display: flex; flex-direction: column; align-items: center; width: 100%; position: relative; }
        
        .lesson-node { width: 70px; height: 70px; border-radius: 50%; background: var(--card-dark); border: 3px solid var(--text-dim); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; font-size: 1rem; cursor: pointer; transition: all 0.2s; position: relative; z-index: 2; gap: 2px; margin: 5px 0; }
        
        /* Path line connecting nodes */
        .lesson-node::before { content: ''; position: absolute; bottom: 100%; width: 3px; height: 20px; background: var(--border-color); z-index: 1; }
        /* Hide line for the very first node of the entire app or first of unit */
        .lesson-node.first-node::before { display: none; }
        
        .lesson-node.completed::before { background: var(--primary-green); }
        
        .lesson-node:hover:not(.locked) { transform: scale(1.1); border-color: var(--secondary-blue); }
        .lesson-node.completed { border-color: var(--primary-green); color: var(--primary-green); background: rgba(88, 204, 2, 0.1); }
        .lesson-node.locked { opacity: 0.4; cursor: not-allowed; }
        .lesson-node.current { border-color: var(--secondary-blue); box-shadow: 0 0 15px rgba(28, 176, 246, 0.4); animation: bounce 2s infinite; }
        .lesson-node .icon { font-size: 1.5rem; }
        .lesson-node .lvl { font-size: 0.6rem; opacity: 0.7; }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-8px);} 60% {transform: translateY(-4px);} }

        /* Global Progress */
        .global-progress-container { width: 100%; margin-bottom: 30px; background: var(--card-dark); padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); }
        .gp-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.8rem; color: var(--text-dim); }
        .gp-bar { width: 100%; height: 6px; background: var(--border-color); border-radius: 3px; overflow: hidden; }
        .gp-fill { height: 100%; background: linear-gradient(90deg, var(--primary-green), var(--bonus-gold)); width: 0%; transition: width 0.5s; }

        /* Lesson Screen */
        .progress-bar { width: 100%; height: 8px; background: var(--border-color); border-radius: 4px; margin-bottom: 20px; display: flex; gap: 2px; overflow: hidden; }
        .progress-segment { flex: 1; background: transparent; transition: background 0.3s; border-radius: 4px; }
        .progress-segment.done { background: var(--primary-green); }
        .progress-segment.current { background: var(--text-dim); animation: pulse-segment 1s infinite; }
        @keyframes pulse-segment { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .lesson-content { flex: 1; display: flex; flex-direction: column; width: 100%; justify-content: center; overflow-y: auto; padding-bottom: 10px; }
        
        .prompt-text { text-align: center; font-size: 1rem; color: var(--text-dim); margin-bottom: 10px; }
        .main-text { text-align: center; font-size: 1.6rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .main-text .emoji { font-size: 2rem; }

        /* Inputs */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-btn { background: var(--card-dark); border: 2px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 12px; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; position: relative; overflow: hidden; }
        .opt-btn:active { transform: scale(0.98); }
        .opt-btn.selected { border-color: var(--secondary-blue); background: rgba(28, 176, 246, 0.2); color: var(--secondary-blue); }
        .opt-btn.correct { border-color: var(--primary-green); background: rgba(88, 204, 2, 0.2); color: var(--primary-green); }
        .opt-btn.wrong { border-color: var(--error-red); background: rgba(255, 75, 75, 0.2); color: var(--error-red); }

        .sentence-area { min-height: 60px; border: 2px dashed var(--border-color); border-radius: 12px; padding: 10px; display: flex; flex-wrap: wrap; gap: 6px; align-content: center; justify-content: center; margin-bottom: 15px; }
        .token { background: #fff; color: #333; padding: 6px 12px; border-radius: 6px; font-weight: 700; font-size: 0.9rem; cursor: pointer; box-shadow: 0 2px 0 #aaa; transition: transform 0.1s; }
        .token:active { transform: translateY(2px); box-shadow: 0 0 0 #aaa; }
        .token.placed { opacity: 0.3; pointer-events: none; }
        .token.in-sentence { background: #f0f0f0; }
        .bank { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 15px; }

        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .match-card { background: var(--card-dark); border: 2px solid var(--border-color); padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; font-weight: 600; min-height: 70px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 0.95rem; }
        .match-card.selected { border-color: var(--secondary-blue); background: rgba(28, 176, 246, 0.2); transform: scale(1.02); }
        .match-card.matched { border-color: var(--primary-green); background: rgba(88, 204, 2, 0.2); color: var(--primary-green); pointer-events: none; opacity: 0.6; transform: scale(0.95); }

        .audio-prompt-btn { background: var(--secondary-blue); border: none; border-radius: 50%; width: 70px; height: 70px; font-size: 2rem; cursor: pointer; margin: 0 auto 20px; display: block; color: white; box-shadow: 0 4px 0 #1899D6; transition: transform 0.1s; }
        .audio-prompt-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #1899D6; }

        .speak-btn { width: 100%; background: var(--secondary-blue); color: white; border: none; border-bottom: 4px solid #1899D6; padding: 15px; font-size: 1rem; font-weight: 700; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .speak-btn.listening { background: var(--error-red); border-bottom-color: #D43939; animation: pulse 1.5s infinite; }
        
        .write-mode-btn { background: transparent; border: none; color: var(--text-dim); text-decoration: underline; font-size: 0.8rem; cursor: pointer; margin-top: 5px; }
        .text-input-fallback { width: 100%; background: var(--card-dark); border: 2px solid var(--border-color); border-radius: 12px; padding: 12px; color: var(--text-main); font-size: 1rem; text-align: center; outline: none; }
        
        /* Footer & Feedback */
        .footer-bar { margin-top: auto; width: 100%; padding-top: 15px; flex-shrink: 0; }
        .feedback-msg { min-height: 50px; border-radius: 10px; display: none; align-items: center; justify-content: center; font-weight: 700; margin-bottom: 10px; padding: 10px; flex-direction: column; font-size: 0.95rem; }
        .feedback-msg.show { display: flex; }
        .feedback-msg.correct { background: rgba(88, 204, 2, 0.2); color: var(--primary-green); border: 2px solid var(--primary-green); }
        .feedback-msg.wrong { background: rgba(255, 75, 75, 0.2); color: var(--error-red); border: 2px solid var(--error-red); }
        
        .btn-main { width: 100%; padding: 14px; border: none; border-bottom: 4px solid #2A3E45; border-radius: 12px; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; cursor: pointer; background: #3D545C; color: #AFAFAF; pointer-events: none; transition: all 0.1s; }
        .btn-main.active { background: var(--primary-green); border-bottom-color: var(--primary-green-dark); color: white; pointer-events: all; }
        .btn-main.retry { background: var(--error-red); border-bottom-color: #D43939; color: white; pointer-events: all; }
        .btn-main.continue { background: var(--secondary-blue); border-bottom-color: #1899D6; color: white; pointer-events: all; }

        /* Overlays */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); display: none; justify-content: center; align-items: center; z-index: 2000; flex-direction: column; text-align: center; padding: 20px; }
        .overlay.active { display: flex; }
        .overlay-icon { font-size: 4rem; margin-bottom: 15px; }
        
        .confetti { position: fixed; width: 10px; height: 10px; animation: fall 3s linear forwards; pointer-events: none; z-index: 3000; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
        
        .loader { border: 4px solid var(--border-color); border-top: 4px solid var(--primary-green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 75, 75, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.3s; }
    </style>
</head>

            <button class="btn-main active" onclick="exitToMap()">CONTINUAR</button>

        <!-- GAME OVER -->
        <div id="overlay-gameover" class="overlay">

            <h2 style="margin-bottom:10px; font-size:1.5rem">Lección fallida</h2>
            <p style="color: var(--text-dim); margin-bottom: 20px; font-size:0.9rem">Te has quedado sin vidas.</p>

            <button class="btn-main" style="margin-top:10px; background:#333; border-bottom-color:#222; color:#aaa; pointer-events:all;" onclick="exitToMap()">VOLVER</button>
        </div>
        
        <!-- SHOP -->

            <div style="background:var(--card-dark); padding:20px; border-radius:15px; margin-top:20px; cursor:pointer;" onclick="shopPurchase('hearts')">
                <div style="font-size: 2rem;">❤️</div>
                <div style="font-weight:700; margin-top:10px;">Recargar Vidas</div>
                <div style="color: var(--bonus-gold); margin-top:5px;">50 💎</div>
            </div>
            <button class="btn-main" style="margin-top:30px; background:#333; border-bottom-color:#222; color:#aaa; pointer-events:all;" onclick="closeShop()">Cerrar</button>
        </div>
    </main>

        // --- STATE & DOM ---
        let state = { hearts: 5, gems: 500, streak: 0, completed: [], currentQ: 0, answers: [], selected: null, checking: false };
        let currentLessonData = null;
        let recognition = null;
        let matchState = { first: null, second: null, lock: false, solved: [] };
        let DB = { units: [] }; 
        let audioCtx = null; 

        const DOM = {
            hearts: document.getElementById('s-hearts'),
            gems: document.getElementById('s-gems'),

            overlayShop: document.getElementById('overlay-shop')
        };

        // --- SOUND ENGINE ---
        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'win') {
                osc.type = 'sine';
                const now = audioCtx.currentTime;
                osc.frequency.setValueAtTime(523.25, now); 
                osc.frequency.setValueAtTime(659.25, now + 0.1); 
                osc.frequency.setValueAtTime(783.99, now + 0.2); 
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start();
                osc.stop(now + 0.5);
            }
        }

        // --- STORAGE & DATA ---
        const save = () => { try { localStorage.setItem('germango_v71', JSON.stringify(state)); } catch (e) {} };
        const loadLocal = () => { 
            try { 
                const d = localStorage.getItem('germango_v71'); 
                if (d) { 
                    const p = JSON.parse(d); 
                    state.hearts = p.hearts ?? 5; 
                    state.gems = p.gems ?? 500; 
                    state.streak = p.streak ?? 0; 
                    state.completed = p.completed ?? []; 
                } 
            } catch (e) {} 
            updateUI(); 
        };

        async function fetchCourseData() {
            let loaded = false;
            if (_supabase) {
                try {
                    const { data: units } = await _supabase.from('units').select('*').order('order_index');
                    if (units && units.length > 0) {
                        const { data: lessons } = await _supabase.from('lessons').select('*').order('order_index');
                        const { data: questions } = await _supabase.from('questions').select('*').order('order_index');
                        DB.units = units.map(u => ({
                            ...u,
                            lessons: lessons.filter(l => l.unit_id === u.id).map(l => ({
                                ...l,
                                questions: questions.filter(q => q.lesson_id === l.id).map(q => ({ ...q, ...q.content }))
                            }))
                        }));
                        loaded = true;
                    }
                } catch (e) { console.warn("Supabase error, fallback local", e); }
            }
            if (!loaded) DB = JSON.parse(JSON.stringify(LOCAL_DB));
            renderMap();
        }

        // --- UI ---
        const updateUI = () => {
            DOM.hearts.innerText = state.hearts;
            DOM.gems.innerText = state.gems;
            DOM.streak.innerText = state.streak;
            renderMap();
        };

        const showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
        
        const openShop = () => { DOM.overlayShop.classList.add('active'); };
        const closeShop = () => { DOM.overlayShop.classList.remove('active'); };
        
        const buyLivesRetry = () => {
            if(state.gems >= 50) {
                state.gems -= 50;
                state.hearts = 5;
                save();
                updateUI();
                DOM.overlayGameover.classList.remove('active');
                startLesson(currentLessonData);
            } else {
                alert("No tienes suficientes gemas.");
            }
        };

        const shopPurchase = (item) => {
            if (item === 'hearts') {
                if (state.gems >= 50) { state.gems -= 50; state.hearts = 5; playSound('correct'); save(); updateUI(); closeShop(); }
                else { alert("Gemas insuficientes"); playSound('wrong'); }
            }
        };

        // --- MAP RENDERER (Fixed Logic) ---
        const renderMap = () => {
            if(DB.units.length === 0) return; 
            DOM.mapContainer.innerHTML = ''; 
            
            // Flatten ALL lessons into a single array to manage global progress easily
            const allLessons = DB.units.flatMap(u => u.lessons.map(l => ({...l, unitTitle: u.title})));

            let totalLessons = allLessons.length;
            const progressPercent = totalLessons > 0 ? (state.completed.length / totalLessons) * 100 : 0;

            // Global Progress
            let gpHtml = `
                <div class="global-progress-container">
                    <div class="gp-header"><span>Progreso Global</span><span>${Math.round(progressPercent)}%</span></div>
                    <div class="gp-bar"><div class="gp-fill" style="width: ${progressPercent}%"></div></div>
                </div>
            `;
            DOM.mapContainer.innerHTML += gpHtml;

            let globalIndex = 0; // Track absolute position in the game

            DB.units.forEach((unit) => {
                const unitDiv = document.createElement('div');
                unitDiv.className = 'unit-container';
                
                const header = document.createElement('div');
                header.className = 'unit-header';
                header.innerHTML = `<div class="unit-title">${unit.title}</div><div class="unit-sub">${unit.subtitle}</div>`;
                unitDiv.appendChild(header);

                const lessonsRow = document.createElement('div');
                lessonsRow.className = 'lessons-row';
                
                unit.lessons.forEach((les) => {
                    const node = document.createElement('div');
                    node.className = 'lesson-node';
                    
                    // Determine if it's the very first node of the game to hide the top line
                    if (globalIndex === 0) node.classList.add('first-node');

                    // LOCK LOGIC FIXED:
                    // A lesson is unlocked if:
                    // 1. It is the very first lesson (index 0)
                    // 2. The previous lesson (index - 1) exists in the completed array
                    const isDone = state.completed.includes(les.id);
                    const prevLesson = globalIndex > 0 ? allLessons[globalIndex - 1] : null;
                    const prevDone = prevLesson ? state.completed.includes(prevLesson.id) : false;
                    const isUnlocked = (globalIndex === 0) || prevDone;

                    if (isDone) { 
                        node.classList.add('completed'); 
                        node.innerHTML = `<span class="icon">✓</span>`; 
                    } else if (isUnlocked) { 
                        node.classList.add('current'); 
                        node.innerHTML = `<span class="icon">${les.icon || '📚'}</span>`; 
                    } else { 
                        node.classList.add('locked'); 
                        node.innerHTML = `<span class="icon">🔒</span>`; 
                    }
                    
                    if (!node.classList.contains('locked')) node.onclick = () => startLesson(les);
                    
                    lessonsRow.appendChild(node);
                    globalIndex++;
                });
                
                unitDiv.appendChild(lessonsRow);
                DOM.mapContainer.appendChild(unitDiv);
            });
        };

        // --- LESSON LOGIC ---
        const startLesson = (les) => {
            currentLessonData = les;
            state.currentQ = 0; state.checking = false; state.selected = null; state.answers = [];
            matchState = { first: null, second: null, lock: false, solved: [] };
            DOM.overlayGameover.classList.remove('active');
            showScreen('screen-lesson');
            renderProgress();
            renderQ();
        };

        const renderProgress = () => {
            DOM.progressBar.innerHTML = '';
            currentLessonData.questions.forEach((_, i) => {
                const seg = document.createElement('div');
                seg.className = 'progress-segment';
                if (i < state.currentQ) seg.classList.add('done');
                else if (i === state.currentQ) seg.classList.add('current');
                DOM.progressBar.appendChild(seg);
            });
        };

        const renderQ = () => {
            const q = currentLessonData.questions[state.currentQ];
            if(!q) return finishLesson(); 

            DOM.feedbackMsg.className = 'feedback-msg';
            DOM.btnAction.className = 'btn-main'; DOM.btnAction.innerText = 'COMPROBAR';
            DOM.btnAction.classList.remove('active');

            const c = DOM.lessonContent;
            let html = `<div class="prompt-text">${q.prompt}</div>`;
            const emojiHtml = q.emoji ? `<span class="emoji">${q.emoji}</span>` : '';

            if (q.type === 'choice' || q.type === 'audio') {
                if (q.type === 'audio') {
                    html += `<button class="audio-prompt-btn" onclick="speak('${q.audioText || q.text}')">🔊</button>`;
                    setTimeout(() => speak(q.audioText || q.text), 300);
                } else {
                    html += `<div class="main-text">${emojiHtml} ${q.text}</div>`;
                }
                
                html += `<div class="options-grid">`;
                const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
                shuffledOptions.forEach((o) => {
                    html += `<button class="opt-btn" onclick="selectChoice(this, '${o.replace(/'/g, "\\'")}')">${o}</button>`;
                });
                html += `</div>`;
            } 
            else if (q.type === 'speak') {
                html += `<div class="main-text">${emojiHtml} ${q.text}</div>
                <div class="speak-container" id="speak-ui">
                    <button class="speak-btn" id="mic-btn" onclick="triggerSpeech()">🎤 Toca para hablar</button>
                    <button class="write-mode-btn" onclick="switchToTyping()">No puedo usar el micrófono</button>
                    <div class="mic-feedback" id="mic-result"></div>
                </div>`;
                setTimeout(() => speak(q.text), 300);
            }
            else if (q.type === 'wordbank') {
                html += `<div class="main-text">${emojiHtml} ${q.text}</div>
                         <div class="sentence-area" id="sentence-area" onclick="clearLastWord()"></div>
                         <div class="bank" id="bank-area">`;
                const shuffledWords = [...q.words].sort(() => Math.random() - 0.5);
                shuffledWords.forEach(w => {
                    html += `<div class="token" data-w="${w}" onclick="addWord(this)">${w}</div>`;
                });
                html += `</div>`;
            }
            else if (q.type === 'match') {
                html += `<div class="match-grid" id="match-grid">`;
                const cards = [];
                q.pairs.forEach((p, i) => { cards.push({id: i, val: p[0]}); cards.push({id: i, val: p[1]}); });
                cards.sort(() => Math.random() - 0.5);
                cards.forEach(card => {
                    html += `<div class="match-card" data-id="${card.id}" onclick="selectMatch(this, ${card.id})">${card.val}</div>`;
                });
                html += `</div>`;
            }

            c.innerHTML = html;
            
            if (q.type === 'speak' && 'webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.continuous = false;
                recognition.interimResults = false;
            }
        };

        // --- INPUT HANDLERS ---
        const selectChoice = (el, val) => { 
            if (state.checking) return; 
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected')); 
            el.classList.add('selected'); 
            state.selected = val; 
            DOM.btnAction.classList.add('active'); 
        };

        const addWord = (el) => { 
            if (state.checking || el.classList.contains('placed')) return; 
            el.classList.add('placed'); 
            state.answers.push(el.dataset.w); 
            renderSentence(); 
        };
        
        const clearLastWord = () => {
             if (state.checking || state.answers.length === 0) return; 
             const w = state.answers.pop(); 
             const btn = document.querySelector(`.token[data-w="${w}"].placed`); 
             if(btn) btn.classList.remove('placed'); 
             renderSentence();
        };

        const removeSpecificWord = (index) => { 
            const w = state.answers[index]; 
            const btn = document.querySelector(`.token[data-w="${w}"].placed`); 
            if(btn) btn.classList.remove('placed'); 
            state.answers.splice(index, 1); 
            renderSentence(); 
        };

        const renderSentence = () => { 
            const area = document.getElementById('sentence-area'); 
            if(!area) return;
            area.innerHTML = ''; 
            state.answers.forEach((w, i) => { 
                const s = document.createElement('div'); 
                s.className = 'token in-sentence'; 
                s.innerText = w; 
                s.onclick = (e) => { e.stopPropagation(); removeSpecificWord(i); }; 
                area.appendChild(s); 
            }); 
            
            if (state.answers.length > 0) DOM.btnAction.classList.add('active'); 
            else DOM.btnAction.classList.remove('active'); 
        };

        const selectMatch = (el, id) => { 
            if (matchState.lock || el.classList.contains('matched') || state.checking) return; 
            
            el.classList.add('selected'); 

            if (!matchState.first) { 
                matchState.first = el; 
            } else { 
                matchState.second = el; 
                
                if (matchState.first.dataset.id === matchState.second.dataset.id && matchState.first !== matchState.second) { 
                    matchState.first.classList.add('matched'); 
                    matchState.second.classList.add('matched'); 
                    matchState.solved.push(id); 
                    matchState.first = null; 
                    matchState.second = null; 
                    matchState.lock = false; 
                    
                    const total = currentLessonData.questions[state.currentQ].pairs.length; 
                    if (matchState.solved.length === total) { 
                        state.selected = "MATCH_COMPLETE"; 
                        handleAction(); 
                    } else {
                        playSound('correct');
                    }
                } else { 
                    matchState.lock = true; 
                    playSound('wrong');
                    setTimeout(() => { 
                        if(matchState.first) matchState.first.classList.remove('selected'); 
                        if(matchState.second) matchState.second.classList.remove('selected'); 
                        matchState.first = null; 
                        matchState.second = null; 
                        matchState.lock = false; 
                    }, 600); 
                } 
            } 
        };
        
        // Speech
        const triggerSpeech = () => { 
            if (!recognition) { alert("Navegador no soportado."); switchToTyping(); return; } 
            
            const micBtn = document.getElementById('mic-btn'); 
            const resultDiv = document.getElementById('mic-result'); 
            
            micBtn.classList.add('listening'); 
            micBtn.innerText = "🔴 Escuchando..."; 
            resultDiv.innerText = ""; 

            recognition.onresult = (event) => { 
                const res = event.results[0][0].transcript.toLowerCase(); 
                resultDiv.innerText = `Dijiste: "${res}"`; 
                checkSpeechResult(res); 
            }; 
            
            recognition.onerror = (event) => { 
                resultDiv.innerText = "Error. Intenta escribir."; 
                resetMicBtn(); 
            }; 
            
            recognition.onend = () => resetMicBtn(); 
            
            try { recognition.start(); } catch(e) { recognition.stop(); recognition.start(); } 
        };

        const resetMicBtn = () => { 
            const micBtn = document.getElementById('mic-btn'); 
            if(micBtn) { 
                micBtn.classList.remove('listening'); 
                micBtn.innerText = "🎤 Toca para hablar"; 
            } 
        };

        const switchToTyping = () => { 
            const container = document.getElementById('speak-ui'); 
            if (!container) return; 
            container.innerHTML = `
                <input type="text" class="text-input-fallback" id="write-input" placeholder="Escribe aquí..." oninput="checkTypingResult()">
                <button class="write-mode-btn" style="margin-top:10px; color:var(--secondary-blue);" onclick="speak(currentLessonData.questions[state.currentQ].text)">🔊 Repetir audio</button>
            `; 
            document.getElementById('write-input').focus(); 
        };

        const checkTypingResult = () => { 
            const input = document.getElementById('write-input'); 
            if(!input) return;
            const val = input.value.toLowerCase().trim();
            if (val.length > 0) { 
                state.selected = val; 
                DOM.btnAction.classList.add('active'); 
            } else { 
                DOM.btnAction.classList.remove('active'); 
            } 
        };

        const checkSpeechResult = (spokenText) => { 
            const target = currentLessonData.questions[state.currentQ].text.toLowerCase(); 
            const targetWords = target.replace(/[^a-zA-Z0-9äöüß ]/g, "").split(" "); 
            const spokenWords = spokenText.replace(/[^a-zA-Z0-9äöüß ]/g, "").split(" ");
            
            let matchCount = 0;
            targetWords.forEach(tw => { if (spokenWords.includes(tw)) matchCount++; });

            if (matchCount / targetWords.length >= 0.8 || spokenText.includes(target)) { 
                state.selected = spokenText; 
                DOM.btnAction.classList.add('active');
                if (spokenText === target) handleAction();
            } else { 
                state.selected = spokenText; 
                DOM.btnAction.classList.add('active'); 
            } 
        };

        // --- FLOW CONTROL ---
        const handleAction = () => {
            const q = currentLessonData.questions[state.currentQ];
            const txt = document.getElementById('msg-text');
            const sub = document.getElementById('msg-sub');

            if (DOM.btnAction.innerText === 'COMPROBAR') {
                if (!state.selected && matchState.solved.length === 0) return; 
                state.checking = true;
                let isCorrect = false;

                if (q.type === 'choice' || q.type === 'audio') isCorrect = state.selected === q.correct;
                else if (q.type === 'match') isCorrect = matchState.solved.length === q.pairs.length;
                else if (q.type === 'wordbank') isCorrect = JSON.stringify(state.answers) === JSON.stringify(q.correct);
                else if (q.type === 'speak') { 
                    const said = (state.selected || "").toLowerCase(); 
                    const target = q.text.toLowerCase(); 
                    const targetWords = target.split(" "); 
                    const allPresent = targetWords.every(w => said.includes(w)); 
                    if (said === target || allPresent) isCorrect = true; 
                }

                if (isCorrect) {
                    playSound('correct');
                    txt.innerText = "¡Excelente!";
                    sub.innerText = (q.type === 'speak' && q.meaning) ? `${q.text} = ${q.meaning}` : "";
                    DOM.feedbackMsg.className = "feedback-msg show correct";
                    DOM.btnAction.innerText = "CONTINUAR"; 
                    DOM.btnAction.className = "btn-main continue";
                } else {
                    playSound('wrong');
                    txt.innerText = "Incorrecto";
                    let cText = q.correct || q.text; 
                    if (q.type === 'wordbank') cText = q.correct.join(" "); 
                    if (q.type === 'audio') cText = q.correct;
                    sub.innerText = `Correcto: ${cText}`;
                    
                    DOM.feedbackMsg.className = "feedback-msg show wrong";
                    DOM.screenLesson.classList.add('shake');
                    setTimeout(() => DOM.screenLesson.classList.remove('shake'), 300);
                    
                    state.hearts--; updateUI(); save();
                    DOM.btnAction.innerText = "CONTINUAR"; 
                    DOM.btnAction.className = "btn-main retry";
                    
                    if (q.type === 'choice' || q.type === 'audio') { 
                        document.querySelectorAll('.opt-btn').forEach(b => { 
                            if(b.innerText.includes(q.correct)) b.classList.add('correct'); 
                            if(b.classList.contains('selected')) b.classList.add('wrong'); 
                        }); 
                    }
                }
            } else {
                if (state.hearts <= 0) { 
                    DOM.overlayGameover.classList.add('active'); 
                    return; 
                }
                
                state.currentQ++;
                state.checking = false; 
                state.selected = null; 
                state.answers = [];
                matchState = { first: null, second: null, lock: false, solved: [] };
                
                if (state.currentQ >= currentLessonData.questions.length) finishLesson(); 
                else { renderProgress(); renderQ(); }
            }
        };

        const finishLesson = () => { 
            playSound('win');
            if (!state.completed.includes(currentLessonData.id)) { 
                state.completed.push(currentLessonData.id); 
                state.gems += 20; 
                state.streak++; 
                save(); // Save immediately before showing result screen
                updateUI(); 
            } 
            for(let i=0; i<50; i++) createConfetti(); 
            showScreen('screen-result'); 
        };
        
        const exitToMap = () => { showScreen('screen-map'); };

        // --- UTILS ---
        function speak(t) { 
            if (!('speechSynthesis' in window)) return; 
            try { 
                window.speechSynthesis.cancel(); 
                const u = new SpeechSynthesisUtterance(t); 
                u.lang='de-DE'; 
                u.rate = 0.9; 
                window.speechSynthesis.speak(u); 
            } catch(e) {} 
        }

        function createConfetti() { 
            const c=document.createElement('div'); 
            c.className='confetti'; 
            c.style.left=Math.random()*100+'vw'; 
            c.style.background=['#58CC02','#FFC800','#1CB0F6'][Math.floor(Math.random()*3)]; 
            document.body.appendChild(c); 
            setTimeout(()=>c.remove(), 3000); 
        }

        // INIT
        loadLocal(); 
        fetchCourseData(); 
    </script>
</body>
</html>
